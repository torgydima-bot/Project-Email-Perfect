{% extends "base.html" %}
{% block title %}Редактировать продукт{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0"><i class="bi bi-pencil-square me-2 text-success"></i>Редактировать продукт</h4>
  <a href="/products" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Назад
  </a>
</div>

<div class="card p-4" style="max-width:600px;">
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Название продукта</label>
      <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
      <div class="form-text">Введите название на русском языке</div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Ссылка на продукт (URL)</label>
      <input type="url" name="url" class="form-control" value="{{ product.url or '' }}"
             placeholder="https://...">
      <div class="form-text">Ссылка для кнопки «Узнать подробнее» в письме</div>
    </div>
    <button type="submit" class="btn btn-success">
      <i class="bi bi-floppy me-1"></i>Сохранить
    </button>
  </form>
</div>
{% endblock %}
