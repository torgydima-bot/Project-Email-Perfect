<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Email Perfect{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-envelope-heart-fill me-1"></i> Email Perfect
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/campaigns') %}active{% endif %}"
             href="/campaigns"><i class="bi bi-send me-1"></i>Кампании</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/calendar') %}active{% endif %}"
             href="/calendar"><i class="bi bi-calendar3 me-1"></i>Календарь</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/contacts') %}active{% endif %}"
             href="/contacts"><i class="bi bi-people me-1"></i>Контакты</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/products') %}active{% endif %}"
             href="/products"><i class="bi bi-box-seam me-1"></i>Продукты</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/media') %}active{% endif %}"
             href="/media"><i class="bi bi-images me-1"></i>Медиа</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
